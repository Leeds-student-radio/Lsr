<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSR - Popular Songs</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: rgb(160, 43, 43);
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 10px 10px;
        }

        .leaderboard-container {
            width: 100%;
            max-width: 600px;
            background-color: rgb(205, 50, 50);
            border-radius: 12px;
            padding: 20px;
            border: 2px solid #8f1818;
            box-sizing: border-box;
        }

        h1, h3 { text-align: center; margin: 5px 0; }
        .timestamp { text-align: center; font-size: 0.8em; opacity: 0.8; margin-bottom: 20px; display: block; }

        /* THE GRID ENGINE */
        .song-table {
            display: table;
            width: 100%;
            table-layout: fixed; /* Forces the columns to stay aligned */
            border-collapse: collapse;
        }

        .row { display: table-row; }

        .cell {
            display: table-cell;
            vertical-align: middle;
            padding: 12px 5px;
            border-bottom: 1px solid #8f1818;
        }

        /* Header Specifics */
        .header-row {
            font-weight: bold;
            font-size: 0.75em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
        }
        .header-row .cell { border-bottom: 2px solid #8f1818; }

        /* Column Widths */
        .col-rank { width: 35px; text-align: center; } /* Slightly widened to fit the circular badges */
        .col-song { width: auto; } 
        .col-plays { width: 30px; text-align: right; padding-right: 10px; }

        /* Ranking Colors & Custom Icons */
        .rank-num { font-weight: bold; font-size: 1.1em; }
        
        .rank-icon {
            aspect-ratio: 1 / 1;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            background: rgb(160, 43, 43);
            border: 1px solid rgb(143, 24, 24);
            border-radius: 50%;
            padding: 5px;
            box-sizing: border-box; 
            margin: 0 auto; /* Centers the circle inside the table cell */
        }

        /* Top 3 Colors (+1 because of header row) */
        .song-item:nth-child(2) .rank-icon { color: gold; } 
        .song-item:nth-child(3) .rank-icon { color: rgb(214, 214, 214); }
        .song-item:nth-child(4) .rank-icon { color: #cd7f32; } /* Bronze */

        /* Song Content Layout */
        .song-flex {
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .song-image {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            margin-right: 12px;
            flex-shrink: 0;
            object-fit: cover;
            background-color: #8f1818;
        }

        .song-text {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        .title {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
                font-size: 0.9rem;
        }

        .artist {
            font-size: 0.82em;
            opacity: 0.8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="leaderboard-container">
        <h1>LSR Top Chart</h1>
        <h3>Most played songs</h3>
        <span class="timestamp">*NEW (Started at 23:26 on 26/03/2026)</span>
        
        <div class="song-table" id="song-table-body">
            <div class="row header-row">
                <div class="cell col-rank">#</div>
                <div class="cell col-song">Song</div>
                <div class="cell col-plays">Plays</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPSQw2pPTBb9CSYkhQ2TOfwXo2XN6mgiQ",
            authDomain: "shazam-453c8.firebaseapp.com",
            projectId: "shazam-453c8",
            storageBucket: "shazam-453c8.firebasestorage.app",
            messagingSenderId: "765247641391",
            appId: "1:765247641391:web:87f011c239fbd808e033da"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const COLLECTION_NAME = "detected_songs"; 

        async function fetchLeaderboard() {
            const tableContainer = document.getElementById('song-table-body');
            
            try {
                const topSongsQuery = query(
                    collection(db, COLLECTION_NAME), 
                    orderBy("count", "desc"), 
                    limit(50) 
                );

                const querySnapshot = await getDocs(topSongsQuery);
                const rankedSongs = [];
                querySnapshot.forEach((doc) => {
                    rankedSongs.push(doc.data());
                });

                displayLeaderboard(rankedSongs);

            } catch (error) {
                console.error("Error fetching documents: ", error);
            }
        }

        function displayLeaderboard(rankedSongs) {
            const tableContainer = document.getElementById('song-table-body');
            
            // Keep the header, clear only the old data rows
            const headerHtml = `
                <div class="row header-row">
                    <div class="cell col-rank">#</div>
                    <div class="cell col-song">Song</div>
                    <div class="cell col-plays">Plays</div>
                </div>`;
            
            let rowsHtml = headerHtml;

            if (rankedSongs.length === 0) {
                rowsHtml += '<div class="row"><div class="cell" colspan="3" style="text-align:center; padding:20px;">No songs found.</div></div>';
            } else {
                rankedSongs.forEach((song, index) => {
                    
                    // Logic to swap out standard numbers for custom icons for Top 3
                    let rankDisplay;
                    if (index === 0) {
                        rankDisplay = `<i class="fa-solid fa-star rank-icon"></i>`;
                    } else if (index === 1) {
                        rankDisplay = `<i class="fa-solid fa-2 rank-icon"></i>`;
                    } else if (index === 2) {
                        rankDisplay = `<i class="fa-solid fa-3 rank-icon"></i>`;
                    } else {
                        rankDisplay = `<span class="rank-num">${index + 1}</span>`;
                    }

                    rowsHtml += `
                        <div class="row song-item">
                            <div class="cell col-rank">
                                ${rankDisplay}
                            </div>
                            <div class="cell col-song">
                                <div class="song-flex">
                                    <img src="${song.image || 'https://via.placeholder.com/45'}" class="song-image">
                                    <div class="song-text">
                                        <span class="title">${song.title}</span>
                                        <span class="artist">${song.artist}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="cell col-plays">${song.count}</div>
                        </div>
                    `;
                });
            }

            tableContainer.innerHTML = rowsHtml;
        }

        fetchLeaderboard();
    </script>
</body>
</html>
