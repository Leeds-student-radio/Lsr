<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSR - Popular Songs</title>
   
</head>
<body>

    <div class="leaderboard-container">
        <h1>Popular Songs</h1>
        <p>*NEW (Started at 23:26 on 26/03/2026)</p>
        
        <div class="list-header">
            <span>#</span>
            <span class="header-song">Song</span>
            <span>Plays</span>
        </div>

        <ul id="song-list">
            </ul>
    </div>

   
</body>
</html>
<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: rgb(160, 43, 43);
    color: #ffffff;
    margin: 0;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
}

.leaderboard-container {
    width: 100%;
    max-width: 600px;
    background-color: rgb(205, 50, 50);
    border-radius: 12px;
    padding: 20px;
        border: 2px solid #8f1818;
   
}

h1 {
    text-align: center;
    margin-bottom: 24px;
    color: white;
}
p {
    text-align: center;
    margin-bottom: 24px;
  color: whitesmoke;
}

.list-header {
    display: flex;
    padding: 10px 15px;
    border-bottom: 2px solid #8f1818;
    font-weight: bold;
    color: whitesmoke;
    font-size: 0.85em;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.list-header span:nth-child(1) { width: 40px; text-align: center; }
.header-song { flex-grow: 1; margin-left: 15px; }
.list-header span:nth-child(3) { width: 50px; text-align: right; }

ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

.song-item {
    display: flex;
    align-items: center;
    padding: 12px 15px;
    border-bottom: 1px solid #8f1818;
    transition: background-color 0.2s ease;
}

.song-item:hover {
    background-color: #ec3a3a;
    border-radius: 8px;
    border-bottom-color: transparent;
    cursor:pointer;
}

.rank {
    width: 40px;
    text-align: center;
    font-size: 1.2em;
    font-weight: bold;
    color: #888;
}

/* Make the top 3 numbers pop */
.song-item:nth-child(1) .rank { color: #ffd700; font-size: 1.4em; } /* Gold */
.song-item:nth-child(2) .rank { color: #c0c0c0; font-size: 1.3em; } /* Silver */
.song-item:nth-child(3) .rank { color: #cd7f32; font-size: 1.3em; } /* Bronze */

.song-info {
    display: flex;
    align-items: center;
    flex-grow: 1;
    margin-left: 15px;
    overflow: hidden;
}

.song-image {
    width: 50px;
    height: 50px;
    border-radius: 6px;
    object-fit: cover;
    margin-right: 15px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
}

.text-info {
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.title {
    font-weight: 600;
    font-size: 1.05em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
}

.artist {
    font-size: 0.85em;
    color: whitesmoke;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.play-count {
    width: 50px;
    text-align: right;
    font-weight: bold;
    font-size: 1.1em;
    color: #ffffff;
}
</style>
<script type="module">

// Notice we added 'query', 'orderBy', and 'limit' to do the sorting on the database side
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

// 2. Your Firebase Configuration (Replace with YOUR actual config object)
const firebaseConfig = {
 apiKey: "AIzaSyDPSQw2pPTBb9CSYkhQ2TOfwXo2XN6mgiQ",
  authDomain: "shazam-453c8.firebaseapp.com",
  projectId: "shazam-453c8",
  storageBucket: "shazam-453c8.firebasestorage.app",
  messagingSenderId: "765247641391",
  appId: "1:765247641391:web:87f011c239fbd808e033da"
};

// 3. Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Update this to whatever you named this new aggregated collection
const COLLECTION_NAME = "detected_songs"; 

// 4. Fetch the Pre-Sorted Data
async function fetchLeaderboard() {
    const listContainer = document.getElementById('song-list');
    listContainer.innerHTML = '<li style="text-align:center; padding: 20px;">Loading charts...</li>';

    try {
        // Create a query that grabs the top 50 songs, ordered by the 'count' field (Highest to Lowest)
        const topSongsQuery = query(
            collection(db, COLLECTION_NAME), 
            orderBy("count", "desc"), 
            limit(50) 
        );

        const querySnapshot = await getDocs(topSongsQuery);
        const rankedSongs = [];

        // Push the pre-sorted data straight into our array
        querySnapshot.forEach((doc) => {
            rankedSongs.push(doc.data());
        });

        // Send to the display function
        displayLeaderboard(rankedSongs);

    } catch (error) {
        console.error("Error fetching documents: ", error);
        listContainer.innerHTML = '<li style="text-align:center; color: #ff4c4c; padding: 20px;">Failed to load leaderboard. Check console for details.</li>';
    }
}

// 5. Render to the DOM
function displayLeaderboard(rankedSongs) {
    const listContainer = document.getElementById('song-list');
    listContainer.innerHTML = ''; // Clear loading text

    if (rankedSongs.length === 0) {
        listContainer.innerHTML = '<li style="text-align:center; padding: 20px;">No songs played yet!</li>';
        return;
    }

    rankedSongs.forEach((song, index) => {
        const li = document.createElement('li');
        li.className = 'song-item';

        // Notice we changed ${song.plays} to ${song.count} to match your new database structure
        li.innerHTML = `
            <div class="rank">${index + 1}</div>
            <div class="song-info">
                <img src="${song.image}" alt="${song.title}" class="song-image">
                <div class="text-info">
                    <span class="title">${song.title}</span>
                    <span class="artist">${song.artist}</span>
                </div>
            </div>
            <div class="play-count">${song.count}</div> 
        `;

        listContainer.appendChild(li);
    });
}

// 6. Trigger the fetch when the script loads
fetchLeaderboard();
</script>
