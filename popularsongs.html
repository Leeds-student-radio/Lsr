<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSR - Popular Songs & Artists</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: rgb(160, 43, 43);
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 10px 10px;
        }

        .leaderboard-container {
            width: 100%;
            max-width: 600px;
            background-color: rgb(205, 50, 50);
            border-radius: 12px;
            padding: 20px;
            border: 2px solid #8f1818;
            box-sizing: border-box;
        }

        h1, h3 { text-align: center; margin: 5px 0; }
        .timestamp { text-align: center; font-size: 0.8em; opacity: 0.8; margin-bottom: 15px; display: block; }

        .filter-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-btn {
            background-color: #8f1818;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s ease-in-out;
        }

        .filter-btn.active {
            background-color: #ffffff;
            color: #8f1818;
        }

        .filter-btn:hover:not(.active) {
            background-color: #6a1010;
        }

        /* THE GRID ENGINE */
        .song-table {
            display: table;
            width: 100%;
            table-layout: fixed;
            border-collapse: collapse;
        }

        .row { display: table-row; }

        .cell {
            display: table-cell;
            vertical-align: middle;
            padding: 12px 5px;
            border-bottom: 1px solid #8f1818;
        }

        .header-row {
            font-weight: bold;
            font-size: 0.75em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
        }
        .header-row .cell { border-bottom: 2px solid #8f1818; }

        .col-rank { width: 35px; text-align: center; } 
        .col-song { width: auto; } 
        .col-plays { width: 45px; text-align: right; padding-right: 10px; }

        .rank-num { font-weight: bold; font-size: 1.1em; }
        
        .rank-icon {
            aspect-ratio: 1 / 1;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            background: rgb(160, 43, 43);
            border: 1px solid rgb(143, 24, 24);
            border-radius: 50%;
            padding: 5px;
            box-sizing: border-box; 
            margin: 0 auto; 
        }

        .song-item:nth-child(2) .rank-icon { color: gold; } 
        .song-item:nth-child(3) .rank-icon { color: rgb(214, 214, 214); }
        .song-item:nth-child(4) .rank-icon { color: #cd7f32; } 

        .song-flex {
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .song-image {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            margin-right: 12px;
            flex-shrink: 0;
            object-fit: cover;
            background-color: #8f1818;
        }

        .song-text {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        .title {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.9rem;
        }

        .artist {
            font-size: 0.82em;
            opacity: 0.8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="leaderboard-container">
        <h1>LSR Top Chart</h1>
        <h3 id="chart-title">Most played songs</h3>
        <span class="timestamp">*NEW (Started at 23:26 on 26/03/2026)</span>

        <div class="filter-controls">
            <button class="filter-btn active" id="btn-songs">Songs</button>
            <button class="filter-btn" id="btn-artists">Artists</button>
        </div>
        
        <div class="song-table" id="song-table-body">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPSQw2pPTBb9CSYkhQ2TOfwXo2XN6mgiQ",
            authDomain: "shazam-453c8.firebaseapp.com",
            projectId: "shazam-453c8",
            storageBucket: "shazam-453c8.firebasestorage.app",
            messagingSenderId: "765247641391",
            appId: "1:765247641391:web:87f011c239fbd808e033da"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Cache the data so we only fetch from Firebase once per page load
        let cachedSongs = null;
        let cachedArtists = null;

        async function fetchCollectionData(collectionName) {
            try {
                const q = query(
                    collection(db, collectionName), 
                    orderBy("count", "desc"), 
                    limit(50) 
                );

                const querySnapshot = await getDocs(q);
                const results = [];
                querySnapshot.forEach((doc) => {
                    results.push(doc.data());
                });
                return results;

            } catch (error) {
                console.error(`Error fetching ${collectionName}: `, error);
                return [];
            }
        }

        function displayLeaderboard(data, viewType) {
            const tableContainer = document.getElementById('song-table-body');
            const titleElement = document.getElementById('chart-title');
            
            const mainColHeader = viewType === 'songs' ? 'Song' : 'Artist';
            titleElement.innerText = viewType === 'songs' ? 'Most played songs' : 'Most played artists';

            const headerHtml = `
                <div class="row header-row">
                    <div class="cell col-rank">#</div>
                    <div class="cell col-song">${mainColHeader}</div>
                    <div class="cell col-plays">Plays</div>
                </div>`;
            
            let rowsHtml = headerHtml;

            if (data.length === 0) {
                rowsHtml += `<div class="row"><div class="cell" colspan="3" style="text-align:center; padding:20px;">No ${viewType} found yet. Play some music!</div></div>`;
            } else {
                data.forEach((item, index) => {
                    let rankDisplay;
                    if (index === 0) {
                        rankDisplay = `<i class="fa-solid fa-star rank-icon"></i>`;
                    } else if (index === 1) {
                        rankDisplay = `<i class="fa-solid fa-2 rank-icon"></i>`;
                    } else if (index === 2) {
                        rankDisplay = `<i class="fa-solid fa-3 rank-icon"></i>`;
                    } else {
                        rankDisplay = `<span class="rank-num">${index + 1}</span>`;
                    }

                    // For artists, the name is saved as 'name'. For songs, it's 'title'
                    const displayTitle = item.title || item.name;
                    // If it's an artist view, we can just put "Total Plays" or leave it blank
                    const displaySubtitle = viewType === 'songs' ? item.artist : "Total Plays";

                    rowsHtml += `
                        <div class="row song-item">
                            <div class="cell col-rank">
                                ${rankDisplay}
                            </div>
                            <div class="cell col-song">
                                <div class="song-flex">
                                    <img src="${item.image || 'https://via.placeholder.com/45'}" class="song-image">
                                    <div class="song-text">
                                        <span class="title">${displayTitle}</span>
                                        <span class="artist">${displaySubtitle}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="cell col-plays">${item.count}</div>
                        </div>
                    `;
                });
            }

            tableContainer.innerHTML = rowsHtml;
        }

        // --- Event Listeners for Toggles ---
        document.getElementById('btn-songs').addEventListener('click', async (e) => {
            document.getElementById('btn-songs').classList.add('active');
            document.getElementById('btn-artists').classList.remove('active');
            
            // If we don't have the songs loaded yet, fetch them
            if (!cachedSongs) {
                document.getElementById('song-table-body').innerHTML = '<div class="row"><div class="cell" style="text-align:center; padding:20px;">Loading songs...</div></div>';
                cachedSongs = await fetchCollectionData("detected_songs");
            }
            displayLeaderboard(cachedSongs, 'songs');
        });

        document.getElementById('btn-artists').addEventListener('click', async (e) => {
            document.getElementById('btn-artists').classList.add('active');
            document.getElementById('btn-songs').classList.remove('active');
            
            // If we don't have the artists loaded yet, fetch them
            if (!cachedArtists) {
                document.getElementById('song-table-body').innerHTML = '<div class="row"><div class="cell" style="text-align:center; padding:20px;">Loading artists...</div></div>';
                cachedArtists = await fetchCollectionData("artists");
            }
            displayLeaderboard(cachedArtists, 'artists');
        });

        // Initialize by clicking the "Songs" button automatically
        document.getElementById('btn-songs').click();
    </script>
</body>
</html>
